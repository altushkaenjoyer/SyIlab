name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_secret_32_chars_minimum_abcde
          JWT_REFRESH_SECRET: test_refresh_32_chars_minimum_abcd
          ENCRYPTION_KEY: "12345678901234567890123456789012"
          NODE_ENV: test
        run: npm run test:unit

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: syllab
          POSTGRES_PASSWORD: syllab_pass
          POSTGRES_DB: syllab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://syllab:syllab_pass@localhost:5432/syllab_test
        run: npx prisma migrate deploy

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://syllab:syllab_pass@localhost:5432/syllab_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_secret_32_chars_minimum_abcde
          JWT_REFRESH_SECRET: test_refresh_32_chars_minimum_abcd
          ENCRYPTION_KEY: "12345678901234567890123456789012"
          NODE_ENV: test
        run: npm run test:integration

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t syllab-backend:ci .

      - name: Smoke test Docker image
        run: |
          docker run -d \
            --name syllab-test \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e REDIS_URL=redis://localhost:6379 \
            -e JWT_ACCESS_SECRET=test_secret_32_chars_minimum_abcde \
            -e JWT_REFRESH_SECRET=test_refresh_32_chars_minimum_abcd \
            -e ENCRYPTION_KEY=12345678901234567890123456789012 \
            -e NODE_ENV=test \
            -p 3000:3000 \
            syllab-backend:ci || true
          echo "Docker build succeeded"
